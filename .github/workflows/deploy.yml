name: Deploy to EC2

# master 브랜치에 push(PR 머지 포함)될 때 자동 실행
# Actions 탭에서 수동 실행도 가능
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ secrets.EC2_PROJECT_PATH }}

            echo "=== 코드 업데이트 ==="
            git pull origin master

            echo "=== .env.prod 확인 ==="
            if [ ! -f .env.prod ]; then
              echo "ERROR: .env.prod 파일이 없습니다. EC2에서 직접 생성하세요."
              exit 1
            fi

            echo "=== Docker 빌드 & 재시작 ==="
            docker compose -f docker-compose.prod.yml up -d --build

            echo "=== 사용하지 않는 이미지 정리 ==="
            docker image prune -f

            echo "=== 배포 완료 ==="
