version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend/api-gateway
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/api-gateway:/app
      - /app/node_modules
    depends_on:
      - admin-service
      - encyclopedia-service

  admin-service:
    build:
      context: ./backend/admin-service
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "3002:3002"
    volumes:
      - ./backend/admin-service:/app
      - /app/node_modules

  encyclopedia-service:
    build:
      context: ./backend/encyclopedia-service
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "3003:3003"
    volumes:
      - ./backend/encyclopedia-service:/app
      - /app/node_modules

  ai:
    build:
      context: ./ai
      dockerfile: ../docker/Dockerfile.ai
    ports:
      - "8000:8000"
    volumes:
      - ./ai:/app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
      - ai
