# ═══════════════════════════════════════════════════════════════════
# SkinAI - 로컬 통합 실행 docker-compose
# ═══════════════════════════════════════════════════════════════════
#
# 실행:
#   docker compose up --build
#
# 접속:
#   - 모바일 웹      : http://localhost:3000
#   - 관리자 웹      : http://localhost:3010
#   - API Gateway   : http://localhost:3001/api/v1
#   - MySQL         : localhost:3306 (root / 1234)
#
# 모든 백엔드 서비스가 같은 JWT_SECRET 을 공유하도록 .env 의 JWT_SECRET
# 값을 일치시킨다 (admin-service 가 auth-service 발급 토큰을 verify 해야
# 하므로 필수).

x-jwt-env: &jwt-env
  JWT_SECRET: ${JWT_SECRET:-skinai-local-dev-secret-please-change-in-production}
  JWT_EXPIRES_IN: 2h
  JWT_REFRESH_EXPIRES_IN: 14d

x-db-env: &db-env
  DB_HOST: mysql
  DB_PORT: 3306
  DB_USER: root
  DB_PASSWORD: "1234"

services:
  # ────────────────────────────────────────────
  # MySQL (DB) - schema.sql 자동 적용
  # ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: skinai-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
    volumes:
      - mysql_data:/var/lib/mysql
      # 알파벳 순으로 실행되어 모든 서비스 DB 가 자동 생성된다
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ────────────────────────────────────────────
  # API Gateway (3001) - 외부 진입점
  # ────────────────────────────────────────────
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: ../../docker/Dockerfile.backend
    container_name: skinai-api-gateway
    ports:
      - "3001:3001"
    environment:
      <<: *jwt-env
      PORT: 3001
      AUTH_SERVICE_URL: http://auth-service:3002
      USER_SERVICE_URL: http://user-service:3003
      DIAGNOSIS_SERVICE_URL: http://diagnosis-service:3004
      CONTENT_SERVICE_URL: http://content-service:3005
      HOSPITAL_SERVICE_URL: http://hospital-service:3006
      FEEDBACK_SERVICE_URL: http://feedback-service:3007
      ADMIN_SERVICE_URL: http://admin-service:3008
      MONITORING_SERVICE_URL: http://monitoring-service:3009
      AI_SERVICE_URL: http://ai:8001
    depends_on:
      - auth-service
      - user-service
      - diagnosis-service
      - content-service
      - hospital-service
      - feedback-service
      - admin-service
      - monitoring-service

  # ────────────────────────────────────────────
  # 1. 인증 서비스 (3002)
  # ────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: ../../docker/Dockerfile.backend
    container_name: skinai-auth
    ports:
      - "3002:3002"
    environment:
      <<: [*jwt-env, *db-env]
      PORT: 3002
      AUTH_DB_NAME: skinai_auth
      USER_SERVICE_URL: http://user-service:3003
    depends_on:
      mysql:
        condition: service_healthy

  # ────────────────────────────────────────────
  # 2. 사용자 서비스 (3003)
  # ────────────────────────────────────────────
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: ../../docker/Dockerfile.backend
    container_name: skinai-user
    ports:
      - "3003:3003"
    environment:
      <<: [*jwt-env, *db-env]
      PORT: 3003
      USER_DB_NAME: skinai_user
      AUTH_SERVICE_URL: http://auth-service:3002
    depends_on:
      mysql:
        condition: service_healthy

  # ────────────────────────────────────────────
  # 3. 분석 서비스 (3004)
  # ────────────────────────────────────────────
  diagnosis-service:
    build:
      context: ./backend/diagnosis-service
      dockerfile: ../../docker/Dockerfile.backend
    container_name: skinai-diagnosis
    ports:
      - "3004:3004"
    environment:
      <<: [*jwt-env, *db-env]
      PORT: 3004
      DIAGNOSIS_DB_NAME: skinai_diagnosis
      AI_SERVICE_URL: http://ai:8001
    depends_on:
      mysql:
        condition: service_healthy

  # ────────────────────────────────────────────
  # 4. 콘텐츠 서비스 (3005)
  # ────────────────────────────────────────────
  content-service:
    build:
      context: ./backend/content-service
      dockerfile: ../../docker/Dockerfile.backend
    container_name: skinai-content
    ports:
      - "3005:3005"
    environment:
      <<: [*jwt-env, *db-env]
      PORT: 3005
      CONTENT_DB_NAME: skinai_content
    depends_on:
      mysql:
        condition: service_healthy

  # ────────────────────────────────────────────
  # 5. 병원 탐색 서비스 (3006)
  # ────────────────────────────────────────────
  hospital-service:
    build:
      context: ./backend/hospital-service
      dockerfile: ../../docker/Dockerfile.backend
    container_name: skinai-hospital
    ports:
      - "3006:3006"
    environment:
      <<: [*jwt-env, *db-env]
      PORT: 3006
      HOSPITAL_DB_NAME: skinai_hospital
      NAVER_MAP_CLIENT_ID: ${NAVER_MAP_CLIENT_ID:-}
      NAVER_MAP_CLIENT_SECRET: ${NAVER_MAP_CLIENT_SECRET:-}
      NAVER_SEARCH_CLIENT_ID: ${NAVER_SEARCH_CLIENT_ID:-}
      NAVER_SEARCH_CLIENT_SECRET: ${NAVER_SEARCH_CLIENT_SECRET:-}
      NAVER_HOSPITAL_SEARCH_KEYWORD: ${NAVER_HOSPITAL_SEARCH_KEYWORD:-피부과}
      NAVER_HOSPITAL_SEARCH_DISPLAY: ${NAVER_HOSPITAL_SEARCH_DISPLAY:-5}
    depends_on:
      mysql:
        condition: service_healthy

  # ────────────────────────────────────────────
  # 6. 피드백 서비스 (3007)
  # ────────────────────────────────────────────
  feedback-service:
    build:
      context: ./backend/feedback-service
      dockerfile: ../../docker/Dockerfile.backend
    container_name: skinai-feedback
    ports:
      - "3007:3007"
    environment:
      <<: [*jwt-env, *db-env]
      PORT: 3007
      FEEDBACK_DB_NAME: skinai_feedback
      DIAGNOSIS_SERVICE_URL: http://diagnosis-service:3004
    depends_on:
      mysql:
        condition: service_healthy

  # ────────────────────────────────────────────
  # 7. 관리자 서비스 (3008)
  # ────────────────────────────────────────────
  admin-service:
    build:
      context: ./backend/admin-service
      dockerfile: ../../docker/Dockerfile.backend
    container_name: skinai-admin
    ports:
      - "3008:3008"
    environment:
      <<: *jwt-env
      PORT: 3008
      AUTH_SERVICE_URL: http://auth-service:3002
      USER_SERVICE_URL: http://user-service:3003
      DIAGNOSIS_SERVICE_URL: http://diagnosis-service:3004
      CONTENT_SERVICE_URL: http://content-service:3005
      FEEDBACK_SERVICE_URL: http://feedback-service:3007
      MONITORING_SERVICE_URL: http://monitoring-service:3009
    depends_on:
      mysql:
        condition: service_healthy

  # ────────────────────────────────────────────
  # 8. 모니터링 서비스 (3009)
  # ────────────────────────────────────────────
  monitoring-service:
    build:
      context: ./backend/monitoring-service
      dockerfile: ../../docker/Dockerfile.backend
    container_name: skinai-monitoring
    ports:
      - "3009:3009"
    environment:
      <<: [*jwt-env, *db-env]
      PORT: 3009
      MONITORING_DB_NAME: skinai_monitoring
      DIAGNOSIS_SERVICE_URL: http://diagnosis-service:3004
      USER_SERVICE_URL: http://user-service:3003
      AI_SERVICE_URL: http://ai:8001
    depends_on:
      mysql:
        condition: service_healthy

  # ────────────────────────────────────────────
  # 9. AI 진단 서버 (8001)
  # ────────────────────────────────────────────
  ai:
    build:
      context: ./ai
      dockerfile: ../docker/Dockerfile.ai
    container_name: skinai-ai
    ports:
      - "8001:8001"
    volumes:
      - ./ai/model:/app/model:ro

  # ────────────────────────────────────────────
  # 모바일 프론트엔드 (3000)
  # ────────────────────────────────────────────
  mobileweb:
    build:
      context: ./frontend/mobileweb
      dockerfile: ../../docker/Dockerfile.mobileweb
    container_name: skinai-mobileweb
    ports:
      - "3000:3000"
    environment:
      # 브라우저에서 호출하므로 host 머신 기준 URL
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api/v1
    depends_on:
      - api-gateway

  # ────────────────────────────────────────────
  # 관리자 프론트엔드 (3010)
  # ────────────────────────────────────────────
  admin-web:
    build:
      context: ./frontend/admin
      dockerfile: ../../docker/Dockerfile.admin-web
    container_name: skinai-admin-web
    ports:
      - "3010:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api/v1
    depends_on:
      - api-gateway

volumes:
  mysql_data:
