version: '3.8'

services:
  # ── 프론트엔드 ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ── API Gateway (3001) ─────────────────────
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: ../../docker/Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - AUTH_SERVICE_URL=http://auth-service:3002
      - USER_SERVICE_URL=http://user-service:3003
      - DIAGNOSIS_SERVICE_URL=http://diagnosis-service:3004
      - CONTENT_SERVICE_URL=http://content-service:3005
      - HOSPITAL_SERVICE_URL=http://hospital-service:3006
      - FEEDBACK_SERVICE_URL=http://feedback-service:3007
      - ADMIN_SERVICE_URL=http://admin-service:3008
      - MONITORING_SERVICE_URL=http://monitoring-service:3009
      - AI_SERVICE_URL=http://ai:8001
    depends_on:
      - auth-service
      - user-service
      - diagnosis-service
      - content-service
      - hospital-service
      - feedback-service
      - admin-service
      - monitoring-service

  # ── 1. 인증 서비스 (3002) ──────────────────
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: ../../docker/Dockerfile.backend
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DB_HOST=mysql
      - AUTH_DB_NAME=skinai_auth
    depends_on:
      - mysql

  # ── 2. 사용자 서비스 (3003) ────────────────
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: ../../docker/Dockerfile.backend
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - DB_HOST=mysql
      - USER_DB_NAME=skinai_user
    depends_on:
      - mysql

  # ── 3. 분석 서비스 (3004) ──────────────────
  diagnosis-service:
    build:
      context: ./backend/diagnosis-service
      dockerfile: ../../docker/Dockerfile.backend
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - DB_HOST=mysql
      - DIAGNOSIS_DB_NAME=skinai_diagnosis
      - AI_SERVICE_URL=http://ai:8001
    depends_on:
      - mysql

  # ── 4. 콘텐츠 서비스 (3005) ────────────────
  content-service:
    build:
      context: ./backend/content-service
      dockerfile: ../../docker/Dockerfile.backend
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - DB_HOST=mysql
      - CONTENT_DB_NAME=skinai_content
    depends_on:
      - mysql

  # ── 5. 병원 탐색 서비스 (3006) ─────────────
  hospital-service:
    build:
      context: ./backend/hospital-service
      dockerfile: ../../docker/Dockerfile.backend
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - DB_HOST=mysql
      - HOSPITAL_DB_NAME=skinai_hospital
    depends_on:
      - mysql

  # ── 6. 피드백 서비스 (3007) ────────────────
  feedback-service:
    build:
      context: ./backend/feedback-service
      dockerfile: ../../docker/Dockerfile.backend
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - DB_HOST=mysql
      - FEEDBACK_DB_NAME=skinai_feedback
      - DIAGNOSIS_SERVICE_URL=http://diagnosis-service:3004
    depends_on:
      - mysql
      - diagnosis-service

  # ── 7. 관리자 서비스 (3008) ────────────────
  admin-service:
    build:
      context: ./backend/admin-service
      dockerfile: ../../docker/Dockerfile.backend
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
      - DB_HOST=mysql
      - ADMIN_DB_NAME=skinai_admin
      - USER_SERVICE_URL=http://user-service:3003
      - DIAGNOSIS_SERVICE_URL=http://diagnosis-service:3004
      - CONTENT_SERVICE_URL=http://content-service:3005
      - FEEDBACK_SERVICE_URL=http://feedback-service:3007
    depends_on:
      - mysql

  # ── 8. 모니터링-대시보드 서비스 (3009) ─────
  monitoring-service:
    build:
      context: ./backend/monitoring-service
      dockerfile: ../../docker/Dockerfile.backend
    ports:
      - "3009:3009"
    environment:
      - PORT=3009
      - DB_HOST=mysql
      - MONITORING_DB_NAME=skinai_monitoring
      - DIAGNOSIS_SERVICE_URL=http://diagnosis-service:3004
      - USER_SERVICE_URL=http://user-service:3003
    depends_on:
      - mysql
      - diagnosis-service

  # ── 9. AI 진단 서버 (8001) ─────────────────
  ai:
    build:
      context: ./ai
      dockerfile: ../docker/Dockerfile.ai
    ports:
      - "8001:8001"
    volumes:
      - ./ai:/app

  # ── MySQL ──────────────────────────────────
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=1234
    volumes:
      - mysql_data:/var/lib/mysql

  # ── Nginx ──────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - api-gateway
      - ai

volumes:
  mysql_data:
