version: '3.8'

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skin_ai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend/image-analysis
      dockerfile: ../../docker/Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      JWT_SECRET: graduation-project-secret
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: skin_ai
      AI_SERVICE_URL: http://ai:8000
    volumes:
      - ./backend/image-analysis:/app
      - ./backend/uploads:/app/uploads
      - /app/node_modules
    depends_on:
      - mysql
      - ai

  ai:
    build:
      context: ./ai
      dockerfile: ../docker/Dockerfile.ai
    ports:
      - "8000:8000"
    volumes:
      - ./ai:/app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
      - ai
      - mysql

volumes:
  mysql-data:
