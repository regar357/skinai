events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }
    upstream backend {
        server api-gateway:3001;
    }
    upstream ai {
        server ai:8001;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://frontend;
        }

        location /api {
            proxy_pass http://backend;
        }

        location /ai {
            proxy_pass http://ai;
        }
    }
}
