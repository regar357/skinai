events {
    worker_connections 1024;
}

http {
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 이미지 업로드 허용 크기
    client_max_body_size 20M;

    # Docker 내부 DNS resolver — upstream을 변수로 사용할 때 필요
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ─── HTTP → HTTPS 리다이렉트 ─────────────────────────────────
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # ─── 모바일 웹 HTTPS (포트 443) ───────────────────────────────
    server {
        listen 443 ssl;
        ssl_certificate     /etc/letsencrypt/live/skinai.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/skinai.duckdns.org/privkey.pem;

        location /api/v1 {
            set $backend http://api-gateway:3001;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location /ai {
            set $ai http://ai:8001;
            proxy_pass $ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
        }

        location / {
            set $mobileweb http://mobileweb:3000;
            proxy_pass $mobileweb;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }

    # ─── 관리자 웹 HTTPS (포트 3010) ─────────────────────────────
    # HTTP/HTTPS 혼용 시 SSL 핸드셰이크 충돌 방지 → HTTPS 전용으로만 운영
    server {
        listen 3010 ssl;
        ssl_certificate     /etc/letsencrypt/live/skinai.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/skinai.duckdns.org/privkey.pem;

        location /api/v1 {
            set $backend http://api-gateway:3001;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location / {
            set $admin_web http://admin-web:3000;
            proxy_pass $admin_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
